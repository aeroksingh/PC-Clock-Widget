[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=Productivity Clock
Author=Productivity Dashboard
Information=Minimal modern productivity clock widget
Version=1.0

[Variables]
FontName=Inter
FontColor=255,255,255,255
BgColor=18,18,18,200
PrimaryColor=187,134,252,255
SecondaryColor=3,218,198,255

[Background]
Meter=Shape
Shape=Rectangle 0,0,320,400,16 | Fill Color #BgColor# | StrokeWidth 1 | Stroke Color 255,255,255,30

; --- Clock System ---
[MeasureTime]
Measure=Time
Format=%H:%M:%S

[MeasureDate]
Measure=Time
Format=%A, %B %d

[MeterTime]
Meter=String
MeasureName=MeasureTime
X=160
Y=20
StringAlign=Center
FontColor=#FontColor#
FontSize=36
FontFace=#FontName#
FontWeight=700
AntiAlias=1

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=160
Y=75
StringAlign=Center
FontColor=#FontColor#
FontSize=12
FontFace=#FontName#
AntiAlias=1

; --- Daily Briefing ---
[MeterGreeting]
Meter=String
X=160
Y=115
StringAlign=Center
FontColor=#PrimaryColor#
FontSize=16
FontFace=#FontName#
FontWeight=600
Text="Productivity Clock"
AntiAlias=1

[MeterSeparator]
Meter=Shape
Shape=Line 20,150,300,150 | StrokeWidth 1 | Stroke Color 255,255,255,50

; --- ToDo List Display (Sample) ---
[MeterTasksHeader]
Meter=String
X=20
Y=170
FontColor=#FontColor#
FontSize=14
FontFace=#FontName#
FontWeight=600
Text="Tasks"
AntiAlias=1

[MeterTask1]
Meter=String
X=20
Y=200
FontColor=#FontColor#
FontSize=12
FontFace=#FontName#
Text="[ ] Review PRs"
AntiAlias=1

[MeterTask2]
Meter=String
X=20
Y=225
FontColor=#FontColor#
FontSize=12
FontFace=#FontName#
Text="[ ] Finish design"
AntiAlias=1

; --- Habit Tracker (Sample) ---
[MeterHabitsHeader]
Meter=String
X=20
Y=265
FontColor=#FontColor#
FontSize=14
FontFace=#FontName#
FontWeight=600
Text="Habits"
AntiAlias=1

[MeterHabit1]
Meter=String
X=20
Y=295
FontColor=#FontColor#
FontSize=12
FontFace=#FontName#
Text="[ ] Read Book"
AntiAlias=1

[MeterHabit1Streak]
Meter=String
X=280
Y=295
StringAlign=Right
FontColor=255,152,0,255
FontSize=12
FontFace=#FontName#
Text="🔥 5"
AntiAlias=1

; --- Focus Timer Status ---
[MeterFocusHeader]
Meter=String
X=160
Y=350
StringAlign=Center
FontColor=#SecondaryColor#
FontSize=12
FontFace=#FontName#
FontWeight=600
Text="Focus Timer: Use Main App"
AntiAlias=1
